ai_usage_summary: |
  Used an AI assistant for code review, documentation generation, and structural refactoring. No candidate data was sent to hosted APIs during ranking.

methodology_summary: |
  Two-pass hybrid ranking system. Pass 1 streams JSON lines to filter non-target titles and high service-company overlap, retaining the top 2,000 using a bounded min-heap. Pass 2 loads these candidates into memory and computes dense vector embeddings using all-MiniLM-L6-v2 against the job description. The final score blends semantic similarity with hard heuristic requirements (YOE, Production ML experience, recruitability). Output is natively explainable via exposed feature sub-scores.

